# ===============================
# Database Configuration (MySQL)
# ===============================

# JDBC URL for your MySQL database
# Replace 'productivity_db' with your actual database name
spring.datasource.url=jdbc:mysql://localhost:3306/productivity_db

# Database username (default MySQL user is 'root')
spring.datasource.username=root

# Database password (replace with your actual password)
spring.datasource.password=12345678

# ===============================
# JPA / Hibernate Configuration
# ===============================

# Automatically update database schema based on JPA entities
# Options: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL queries for readability
spring.jpa.properties.hibernate.format_sql=true

# Disable open-in-view warning (optional, recommended for APIs)
spring.jpa.open-in-view=false

# Dialect helps Hibernate generate optimized SQL for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Server Configuration
# ===============================

# Default port is 8080; change if needed
server.port=8080

# ===============================
# Logging Configuration
# ===============================

# Set logging level for SQL (optional, helps debugging)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE












